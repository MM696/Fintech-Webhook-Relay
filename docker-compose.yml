services:
  postgres:
    image: postgres:16-alpine
    container_name: webhook-relay-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-webhook_relay}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-webhook_relay}',
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: webhook-relay-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: webhook-relay-api
    restart: unless-stopped
    command: ['/app/docker/entrypoint-api.sh']
    ports:
      - '3333:3333'
    environment:
      TZ: UTC
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3333
      LOG_LEVEL: info
      APP_NAME: ezrah-webhook-relay
      APP_KEY: ${APP_KEY:?Set APP_KEY in .env}
      APP_URL: http://localhost:3333
      API_SECRET_KEY: ${API_SECRET_KEY:-dev-secret-key-change-in-production}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_DATABASE: ${POSTGRES_DB:-webhook_relay}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-10}
      SESSION_DRIVER: cookie
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3333/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: webhook-relay-worker
    restart: unless-stopped
    command: ['/app/docker/entrypoint-worker.sh']
    environment:
      TZ: UTC
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3333
      LOG_LEVEL: info
      APP_NAME: ezrah-webhook-relay
      APP_KEY: ${APP_KEY:?Set APP_KEY in .env}
      APP_URL: http://localhost:3333
      API_SECRET_KEY: ${API_SECRET_KEY:-dev-secret-key-change-in-production}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_DATABASE: ${POSTGRES_DB:-webhook_relay}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-10}
      SESSION_DRIVER: cookie
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy

volumes:
  postgres_data:
